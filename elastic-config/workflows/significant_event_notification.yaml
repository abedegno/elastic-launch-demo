version: "1"
name: NOVA-7 Significant Event Notification
description: >
  Notify launch operations team when a significant event is detected.
  Triggered by alert rules — uses event.rule.tags[1] for the error_type
  search, extracts user_email from event_name, and sends email notification.

triggers:
  - type: alert

steps:
  - name: enrich_context
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs,logs.* | WHERE KQL("body.text: \"{{ event.rule.tags[1] }}\" AND severity_text: \"ERROR\"") | KEEP event_name
      format: json

  - name: count_errors
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs,logs.*
        | WHERE @timestamp > NOW() - 15 MINUTES AND severity_text == "ERROR"
        | STATS total_errors = COUNT(*)
      format: json

  - name: log_notification
    type: console
    with:
      message: >
        NOVA-7 Significant Event — {{ event.rule.name }}.
        Error type: {{ event.rule.tags[1] }}.
        Total errors: {{ steps.count_errors.output.values[0][0] }}.

  - name: parse_event_meta
    type: data.set
    with:
      var:
        - event_meta: "${{ steps.enrich_context.output.values[1][0] | json_parse }}"

  - name: send_notification
    type: email
    connector-id: Elastic-Cloud-SMTP
    with:
      to:
        - "{{ steps.parse_event_meta.output.var[0].event_meta.user_email }}"
      subject: "NOVA-7 Alert: {{ event.rule.name }}"
      message: >
        Significant event detected in NOVA-7 mission:

        Rule: {{ event.rule.name }}
        Error Type: {{ event.rule.tags[1] }}
        Total errors (15m): {{ steps.count_errors.output.values[0][0] }}

        Open Kibana Agent Builder to investigate and request remediation.

  - name: audit_log
    type: elasticsearch.index
    with:
      index: "nova7-significant-events-audit"
      document:
        rule_name: "{{ event.rule.name }}"
        error_type: "{{ event.rule.tags[1] }}"
        total_errors: "{{ steps.count_errors.output.values[0][0] }}"
        mission_id: "NOVA-7"
      refresh: wait_for
