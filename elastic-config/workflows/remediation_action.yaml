version: "1"
name: __SCENARIO_NAME__ Remediation Action
description: >
  Execute remediation actions for __SCENARIO_NAME__ anomalies. Captures pre-action
  state, extracts callback_url from log event_name, executes the
  remediation via HTTP callback, waits for stabilization, verifies
  error counts dropped, and logs the result to an audit index.

triggers:
  - type: manual

inputs:
  - name: error_type
    type: string
    required: true
    description: "Error type to remediate (e.g. the error type reported in the alert)"
  - name: channel
    type: number
    required: true
    description: "Fault channel being remediated (1-20)"
  - name: action_type
    type: string
    required: true
    description: "Remediation action: restart_service, reset_pipeline, failover_service, isolate_subsystem"
  - name: target_service
    type: string
    default: ""
    description: "Service to target for restart/failover actions"
  - name: justification
    type: string
    required: true
    description: "Reason for executing this remediation"
  - name: dry_run
    type: boolean
    default: true

steps:
  - name: pre_action_snapshot
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs,logs.* | WHERE KQL("body.text: \"{{ inputs.error_type }}\" AND severity_text: \"ERROR\"") | KEEP event_name
      format: json

  - name: extract_callback
    type: data.set
    with:
      var:
        - event_meta: "${{ steps.pre_action_snapshot.output.values[1][0] | json_parse }}"

  - name: log_pre_action
    type: console
    with:
      message: >
        Pre-action snapshot for channel {{ inputs.channel }}.
        callback_url extracted from latest error log.
        callback_url: {{ steps.extract_callback.output.var[0].event_meta.callback_url }}.

  - name: safety_check
    type: if
    condition: "inputs.action_type : restart_service"
    steps:
      - name: log_safety_warning
        type: console
        with:
          message: "WARNING: Service restart requested for {{ inputs.target_service }}. Verifying safety constraints before proceeding."

  - name: execute_remediation
    type: http
    with:
      url: "{{ steps.extract_callback.output.var[0].event_meta.callback_url }}/api/chaos/resolve"
      method: POST
      headers:
        Content-Type: application/json
      body:
        action: "{{ inputs.action_type }}"
        channel: "{{ inputs.channel }}"
        deployment_id: "{{ steps.extract_callback.output.var[0].event_meta.deployment_id }}"
        target_service: "{{ inputs.target_service }}"
        dry_run: "{{ inputs.dry_run }}"
        justification: "{{ inputs.justification }}"
      timeout: 120s

  - name: log_action_result
    type: console
    with:
      message: "Remediation {{ inputs.action_type }} executed. Response: {{ steps.execute_remediation.output | json }}"

  - name: wait_for_stabilization
    type: wait
    with:
      duration: "30s"

  - name: post_action_snapshot
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs,logs.*
        | WHERE @timestamp > NOW() - 30 SECONDS AND severity_text == "ERROR"
        | STATS post_errors = COUNT(*)
      format: json

  - name: evaluate_result
    type: if
    condition: "steps.post_action_snapshot.output.values.0.0 : 0"
    steps:
      - name: log_success
        type: console
        with:
          message: "Remediation SUCCESSFUL: Error count dropped to 0 after {{ inputs.action_type }} on channel {{ inputs.channel }}."
    else:
      - name: log_partial
        type: console
        with:
          message: >
            Remediation PARTIAL: Post-action errors =
            {{ steps.post_action_snapshot.output.values[0][0] }}.
            Manual investigation may be needed.

  - name: audit_log
    type: elasticsearch.index
    with:
      index: "__NS__-remediation-audit"
      document:
        channel: "{{ inputs.channel }}"
        action_type: "{{ inputs.action_type }}"
        target_service: "{{ inputs.target_service }}"
        justification: "{{ inputs.justification }}"
        dry_run: "{{ inputs.dry_run }}"
        pre_error_count: "{{ steps.pre_action_snapshot.output.values[0] }}"
        post_error_count: "{{ steps.post_action_snapshot.output.values[0][0] }}"
        mission_id: "__SCENARIO_NAME__"
      refresh: wait_for
